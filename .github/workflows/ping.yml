name: Auto-ping Render

# GitHub Actions scheduled workflows are unreliable (often 30-60 min delays on free runners).
# This workflow is the FALLBACK — the primary keep-alive is the server's internal self-ping
# (server.js setInterval). Multiple staggered crons increase the chance one fires on time.
on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "2-59/5 * * * *"
    - cron: "4-59/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the deployed app
        run: |
          URL="${{ secrets.PING_URL }}"
          if [ -z "$URL" ]; then
            echo "PING_URL secret not set; skipping."
            exit 0
          fi
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
            echo "Attempt $i -> HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 5
          done
          exit 0   # never fail the workflow — pings are best-effort
